name: E2E Tests

on:
  push:
    branches: [main, develop, Refactoring_to_fat_client]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual trigger

jobs:
  # Critical path tests - must pass
  critical-path:
    name: Critical Path Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run critical path tests
        working-directory: frontend
        run: pnpm exec playwright test critical-path/ --reporter=list,html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-path-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: critical-path-failures
          path: frontend/test-results/
          retention-days: 7

  # Feature tests - continue on error
  features:
    name: Feature Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    needs: critical-path

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run feature tests
        working-directory: frontend
        run: pnpm exec playwright test features/ --reporter=list,html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: features-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: features-failures
          path: frontend/test-results/
          retention-days: 7

  # Integration tests - continue on error
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    needs: critical-path

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run integration tests
        working-directory: frontend
        run: pnpm exec playwright test integration/ --reporter=list,html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: frontend/playwright-report/
          retention-days: 30

  # Performance tests - continue on error
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    needs: critical-path

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run performance tests
        working-directory: frontend
        run: pnpm exec playwright test performance/ --reporter=list,html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: frontend/playwright-report/
          retention-days: 30

  # Edge case tests - continue on error
  edge-cases:
    name: Edge Case Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    needs: critical-path

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run edge case tests
        working-directory: frontend
        run: pnpm exec playwright test edge-cases/ --reporter=list,html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-cases-report
          path: frontend/playwright-report/
          retention-days: 30

  # Summary job - fails if critical tests failed
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [critical-path, features, integration, performance, edge-cases]
    if: always()

    steps:
      - name: Check critical path status
        if: needs.critical-path.result == 'failure'
        run: |
          echo "❌ Critical path tests failed - build should fail"
          exit 1

      - name: Summary
        run: |
          echo "## Test Results Summary"
          echo ""
          echo "- Critical Path: ${{ needs.critical-path.result }}"
          echo "- Features: ${{ needs.features.result }}"
          echo "- Integration: ${{ needs.integration.result }}"
          echo "- Performance: ${{ needs.performance.result }}"
          echo "- Edge Cases: ${{ needs.edge-cases.result }}"
          echo ""

          if [ "${{ needs.critical-path.result }}" == "success" ]; then
            echo "✅ All critical tests passed!"
          else
            echo "❌ Critical tests failed - see artifacts for details"
          fi
